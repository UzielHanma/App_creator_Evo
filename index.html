<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE OS v4 | Quantum App Synthesizer</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #050505;
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            overflow-x: hidden;
        }
        .font-mono { font-family: 'Space Grotesk', monospace; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .bento-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bento-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #fff 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glow { box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); }
        @keyframes pulse-border { 0% { border-color: rgba(59, 130, 246, 0.3); } 50% { border-color: rgba(139, 92, 246, 0.6); } 100% { border-color: rgba(59, 130, 246, 0.3); } }
        .active-compiling { animation: pulse-border 2s infinite; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden opacity-30">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 rounded-full blur-[120px]"></div>
    </div>

    <main class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header Section -->
        <header class="flex justify-between items-center glass p-6 rounded-3xl mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-xl flex items-center justify-center glow">
                    <i data-lucide="cpu" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tighter uppercase">Forge<span class="text-blue-500">Core</span></h1>
                    <p class="text-[10px] text-white/40 tracking-widest uppercase">Hyper-Core Synthesis V4</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex flex-col items-end">
                    <span class="text-[10px] text-white/40 uppercase">System Status</span>
                    <span class="text-xs text-green-400 font-mono">● All Systems Nominal</span>
                </div>
                <button class="glass px-5 py-2 rounded-full text-xs font-semibold hover:bg-white/10 transition-all border border-white/20">
                    DOCUMENTACIÓN
                </button>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            
            <!-- Left: Input Core -->
            <div class="md:col-span-8 space-y-6">
                <div class="glass p-8 rounded-[2rem] bento-card relative overflow-hidden group">
                    <div class="flex items-center gap-4 mb-6">
                        <i data-lucide="terminal" class="text-blue-500"></i>
                        <h2 class="text-xl font-semibold">Prompt de Arquitectura</h2>
                    </div>
                    <textarea id="app-prompt" 
                        class="w-full h-48 bg-black/40 border border-white/10 rounded-2xl p-6 text-white/80 focus:outline-none focus:border-blue-500/50 transition-all placeholder:text-white/20 resize-none font-mono"
                        placeholder="Describe la aplicación a gran escala que deseas construir... (ej. Un marketplace descentralizado con panel de analytics en tiempo real)"></textarea>
                    
                    <div class="mt-6 flex flex-wrap gap-4">
                        <button onclick="ForgeCore.startSynthesis()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 transition-all glow group">
                            <span>INICIAR SÍNTESIS CUÁNTICA</span>
                            <i data-lucide="zap" class="w-5 h-5 group-hover:fill-current"></i>
                        </button>
                        <button class="glass px-6 py-4 rounded-2xl font-semibold flex items-center gap-2 hover:bg-white/10 transition-all">
                            <i data-lucide="settings-2" class="w-5 h-5"></i>
                            CONFIGURACIÓN APK
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass p-6 rounded-[2rem] bento-card">
                        <h3 class="text-sm font-semibold text-white/40 uppercase mb-4 tracking-widest">Stack Generado</h3>
                        <div id="stack-tags" class="flex flex-wrap gap-2">
                            <span class="px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-lg text-[10px] text-blue-400">REACT NATIVE</span>
                            <span class="px-3 py-1 bg-purple-500/10 border border-purple-500/20 rounded-lg text-[10px] text-purple-400">KOTLIN ENGINE</span>
                            <span class="px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-lg text-[10px] text-emerald-400">DART/FLUTTER</span>
                        </div>
                    </div>
                    <div class="glass p-6 rounded-[2rem] bento-card">
                        <h3 class="text-sm font-semibold text-white/40 uppercase mb-4 tracking-widest">Optimización de Binarios</h3>
                        <div class="space-y-3">
                            <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                                <div id="optimizer-bar" class="h-full bg-gradient-to-r from-blue-500 to-purple-500 w-0 transition-all duration-1000"></div>
                            </div>
                            <div class="flex justify-between text-[10px] font-mono text-white/60">
                                <span>SIZE REDUCTION</span>
                                <span id="optimizer-pcov">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Status Console -->
            <div class="md:col-span-4 space-y-6">
                <div class="glass p-6 rounded-[2rem] bento-card h-full flex flex-col">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="font-bold flex items-center gap-2">
                            <i data-lucide="activity" class="text-purple-500 w-5 h-5"></i>
                            COMPILER LOG
                        </h2>
                        <span class="text-[10px] bg-white/10 px-2 py-1 rounded uppercase">Live Thread</span>
                    </div>
                    <div id="console-output" class="flex-grow font-mono text-[11px] space-y-2 overflow-y-auto max-h-[400px] scrollbar-hide text-white/50">
                        <div class="text-blue-400">> System Ready. Awaiting instructions...</div>
                    </div>
                    <div id="download-zone" class="mt-6 hidden">
                        <button id="btn-download" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white p-4 rounded-xl font-bold flex items-center justify-center gap-3 animate-bounce">
                            <i data-lucide="download"></i>
                            DESCARGAR APK FINAL
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="forge-core.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
